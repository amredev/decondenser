on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/amredev/devcontainer-decondenser:latest
      options: --user amredev

    steps:
      - uses: actions/checkout@v4
      - run: npm run package
      - run: npm run compile-tests
      - run: npm run test
